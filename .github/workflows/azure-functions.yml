name: Deploy Backend — Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - "back-end/**"
      - ".github/workflows/azure-functions.yml"
      - ".github/scripts/**"
  pull_request:
    branches:
      - main
    paths:
      - "back-end/**"
      - ".github/workflows/azure-functions.yml"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: back-end
  DOTNET_VERSION: "8.0.x"
  FUNCTION_APP_NAME: DigitalTwin

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Backend
    defaults:
      run:
        working-directory: back-end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --output ./output --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: back-end/output
          retention-days: 1

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy to Azure Functions
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./output

      - name: Create deployment zip
        run: |
          cd output
          zip -r ../deploy.zip . -q
          ls -lh ../deploy.zip

      - name: Deploy to Azure Functions (Zip Deploy)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          chmod +x .github/scripts/azure-zipdeploy.sh
          .github/scripts/azure-zipdeploy.sh deploy.zip

      - name: Deployment summary
        run: |
          echo "Function App: ${{ env.FUNCTION_APP_NAME }}"
          echo "URL: https://digitaltwin-c8hahfg9b6ctbeg2.canadacentral-01.azurewebsites.net"
          echo ""
          echo "Runtime: set Azure stack to '.NET 8 Isolated' (project targets net8.0)."
          echo "App settings: OPENAI_API_KEY, OPENAI_MODEL, ALLOWED_ORIGINS, etc."
