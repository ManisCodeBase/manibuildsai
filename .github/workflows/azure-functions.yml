name: Deploy Backend — Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - "back-end/**"
      - ".github/workflows/azure-functions.yml"
      - ".github/scripts/**"
  pull_request:
    branches:
      - main
    paths:
      - "back-end/**"
      - ".github/workflows/azure-functions.yml"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  DOTNET_VERSION: "8.0.x"
  FUNCTION_APP_NAME: DigitalTwin
  FUNCTION_APP_URL: https://digitaltwin-c8hahfg9b6ctbeg2.canadacentral-01.azurewebsites.net

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Backend
    defaults:
      run:
        working-directory: back-end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish --configuration Release --output ./output

      - name: Verify publish output
        run: |
          test -f ./output/functions.metadata || (echo "::error::Missing functions.metadata" && exit 1)
          test -f ./output/worker.config.json || (echo "::error::Missing worker.config.json" && exit 1)
          test -f ./output/ManiBuildsAI.Functions.dll || (echo "::error::Missing ManiBuildsAI.Functions.dll" && exit 1)
          test -d ./output/.azurefunctions || (echo "::error::Missing .azurefunctions folder" && exit 1)
          echo "Registered functions:"
          python3 -c "import json; print('\n'.join(f['name'] for f in json.load(open('output/functions.metadata'))))"

      - name: Create deployment zip
        run: |
          cd output
          # Zip here (not after artifact upload) so hidden .azurefunctions is always included
          zip -r ../function-app.zip . -x "*.pdb"
          echo "Zip contents (required files):"
          unzip -l ../function-app.zip | grep -E 'functions.metadata|worker.config.json|ManiBuildsAI.Functions.dll|\.azurefunctions/' || true
          test "$(unzip -l ../function-app.zip | grep -c 'functions.metadata')" -eq 1
          test "$(unzip -l ../function-app.zip | grep -c '\.azurefunctions/')" -ge 1
          ls -lh ../function-app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app-zip
          path: back-end/function-app.zip
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy to Azure Functions
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-zip
          path: .

      - name: Verify deployment zip
        run: |
          test -f ./function-app.zip || (echo "::error::Missing function-app.zip artifact" && exit 1)
          unzip -l ./function-app.zip | grep -E 'functions.metadata|\.azurefunctions/' || true
          test "$(unzip -l ./function-app.zip | grep -c '\.azurefunctions/')" -ge 1

      - name: Deploy to Azure Functions (Zip Deploy)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          chmod +x .github/scripts/azure-zipdeploy.sh
          .github/scripts/azure-zipdeploy.sh function-app.zip "${{ env.FUNCTION_APP_URL }}/api/health"

      - name: Deployment summary
        run: |
          echo "Function App: ${{ env.FUNCTION_APP_NAME }}"
          echo "URL: ${{ env.FUNCTION_APP_URL }}"
          echo "Health: ${{ env.FUNCTION_APP_URL }}/api/health"
          echo "Docs:   ${{ env.FUNCTION_APP_URL }}/api/docs"
          echo "Chat:   POST ${{ env.FUNCTION_APP_URL }}/api/chat"
